sonar.projectKey=jipem
sonar.projectName=JIPEM
sonar.projectVersion=1.0

# Suprimir S6774 (PropTypes validation) — prop-types está deprecado en React 18+
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=javascript:S6774
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.jsx

# Analizar backend (Python) y frontend (JS/JSX)
sonar.sources=backend/apps,frontend/src
sonar.sourceEncoding=UTF-8
sonar.python.version=3.11

# Incluir archivos Python y JavaScript/JSX
sonar.inclusions=**/*.py,**/*.js,**/*.jsx

# Excluir lo que no debe analizarse
sonar.exclusions=\
  **/migrations/**,\
  **/__pycache__/**,\
  **/venv/**,\
  **/env/**,\
  **/*.pyc,\
  **/node_modules/**,\
  **/dist/**,\
  **/static/**,\
  **/tmp_media/**

# Tests
sonar.tests=backend/apps
sonar.test.inclusions=**/tests/**,**/test_*.py
sonar.test.exclusions=\
  **/venv/**,\
  **/env/**,\
  **/__pycache__/**,\
  **/node_modules/**

# Performance: skip XUnit sensor (no hay reportes xunit, solo recorre venv innecesariamente)
sonar.python.xunit.skipDetails=true
